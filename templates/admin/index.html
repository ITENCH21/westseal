{% extends "admin/index.html" %}
{% load i18n %}

{% block content_title %}<h1>Административная панель WESTSEAL</h1>{% endblock %}

{% block sidebar %}
{{ block.super }}
<div id="ws-quick-access" style="
  background:#fff;border-radius:10px;padding:18px 20px;
  box-shadow:0 1px 6px rgba(0,0,0,.08);margin-top:20px;">
  <h3 style="margin:0 0 12px;font-size:.92rem;color:#555;font-weight:700;text-transform:uppercase;letter-spacing:.05em;">
    Быстрый доступ
  </h3>
  <div style="display:flex;flex-direction:column;gap:8px;">
    <a href="/support/admin-requests/" style="
      display:flex;align-items:center;gap:10px;padding:10px 14px;
      background:linear-gradient(135deg,#fff3cd,#ffe082);
      border-radius:8px;text-decoration:none;color:#856404;
      font-weight:600;font-size:.9rem;transition:opacity .15s;">
      <span>📋</span>
      <span>Заявки пользователей</span>
      <span id="ws-req-badge" style="
        margin-left:auto;background:#d1373d;color:#fff;
        border-radius:20px;padding:1px 8px;font-size:.75rem;
        font-weight:700;display:none;"></span>
    </a>
    <a href="/support/admin-chat/" style="
      display:flex;align-items:center;gap:10px;padding:10px 14px;
      background:linear-gradient(135deg,#e3f2fd,#bbdefb);
      border-radius:8px;text-decoration:none;color:#0d47a1;
      font-weight:600;font-size:.9rem;transition:opacity .15s;">
      <span>💬</span>
      <span>Чаты поддержки</span>
      <span id="ws-chat-badge" style="
        margin-left:auto;background:#d1373d;color:#fff;
        border-radius:20px;padding:1px 8px;font-size:.75rem;
        font-weight:700;display:none;"></span>
    </a>
  </div>
</div>
<script>
(function () {
  fetch('/support/admin-counts/', { credentials: 'same-origin' })
    .then(r => r.ok ? r.json() : null)
    .then(d => {
      if (!d) return;
      const rb = document.getElementById('ws-req-badge');
      const cb = document.getElementById('ws-chat-badge');
      if (d.requests_new && rb) { rb.textContent = d.requests_new; rb.style.display = 'inline-block'; }
      if (d.chats_new && cb)    { cb.textContent = d.chats_new;    cb.style.display = 'inline-block'; }
    })
    .catch(() => {});
})();
</script>
{% endblock %}
