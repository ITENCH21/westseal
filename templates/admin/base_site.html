{% extends "admin/base.html" %}
{% load i18n %}

{% block branding %}
<div id="site-name">
  <a href="{% url 'admin:index' %}" style="
      display:flex;align-items:center;gap:10px;
      text-decoration:none;color:#fff;">
    <span style="
      background:rgba(255,255,255,.18);
      border-radius:8px;padding:3px 10px;
      font-size:.78rem;font-weight:800;letter-spacing:.08em;">WS</span>
    <span style="font-size:1rem;font-weight:700;">WESTSEAL</span>
    <span style="font-size:.78rem;opacity:.75;font-weight:400;">Панель управления</span>
  </a>
</div>
{% endblock %}

{% block nav-global %}{% endblock %}

{% block extrahead %}
{{ block.super }}
<style>
  /* ── Sidebar section labels ─────────────────── */
  #nav-sidebar .module caption { font-size:.72rem; letter-spacing:.06em; color:#aaa; }
  /* ── Admin badge pill ───────────────────────── */
  .ws-nav-badge {
    display:inline-block;
    background:#d1373d;
    color:#fff;
    border-radius:20px;
    padding:0 7px;
    font-size:.7rem;
    font-weight:700;
    line-height:1.6;
    vertical-align:middle;
    margin-left:5px;
  }
  /* ── Top bar accent ─────────────────────────── */
  #header { background: linear-gradient(135deg,#d1373d 0%,#1f4a8a 100%); }
  /* ── Quick access panel ─────────────────────── */
  #ws-quick-access {
    margin: 12px 8px 8px;
    background: #fff;
    border-radius: 10px;
    padding: 14px 16px;
    box-shadow: 0 1px 6px rgba(0,0,0,.10);
  }
  #ws-quick-access h4 {
    margin: 0 0 10px;
    font-size: .68rem;
    color: #aaa;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .07em;
  }
  #ws-quick-access .ws-qa-links { display:flex; flex-direction:column; gap:6px; }
  #ws-quick-access a {
    display:flex; align-items:center; gap:8px;
    padding:8px 12px; border-radius:7px;
    text-decoration:none; font-weight:600; font-size:.85rem;
    transition:opacity .15s;
  }
  #ws-quick-access a:hover { opacity:.82; }
  #ws-quick-access a.ws-qa-req  { background:linear-gradient(135deg,#fff3cd,#ffe082); color:#856404; }
  #ws-quick-access a.ws-qa-chat { background:linear-gradient(135deg,#e3f2fd,#bbdefb); color:#0d47a1; }
  #ws-quick-access .ws-qa-badge {
    margin-left:auto; background:#d1373d; color:#fff;
    border-radius:20px; padding:0 7px; font-size:.72rem;
    font-weight:700; display:none;
  }
</style>
{% endblock %}

{% block footer %}
{{ block.super }}
<script>
(function () {
  /* Inject quick-access panel into the left nav-sidebar (works on ALL admin pages) */
  function injectPanel() {
    var sticky = document.querySelector('#nav-sidebar .sticky');
    if (!sticky || document.getElementById('ws-quick-access')) return;
    var panel = document.createElement('div');
    panel.id = 'ws-quick-access';
    panel.innerHTML =
      '<h4>Быстрый доступ</h4>' +
      '<div class="ws-qa-links">' +
        '<a href="/support/admin-requests/" class="ws-qa-req">' +
          '<span>📋</span><span>Заявки</span>' +
          '<span id="ws-req-badge" class="ws-qa-badge"></span>' +
        '</a>' +
        '<a href="/support/admin-chat/" class="ws-qa-chat">' +
          '<span>💬</span><span>Чаты поддержки</span>' +
          '<span id="ws-chat-badge" class="ws-qa-badge"></span>' +
        '</a>' +
      '</div>';
    sticky.appendChild(panel);
  }

  function applyBadges(d) {
    /* quick-access panel */
    var rb = document.getElementById('ws-req-badge');
    var cb = document.getElementById('ws-chat-badge');
    if (rb) { if (d.requests_new) { rb.textContent = d.requests_new; rb.style.display = 'inline-block'; } else { rb.style.display = 'none'; } }
    if (cb) { if (d.chats_new)    { cb.textContent = d.chats_new;    cb.style.display = 'inline-block'; } else { cb.style.display = 'none'; } }

    /* nav-sidebar model links */
    [
      { href: '/support/requestthread/',     count: d.requests_new },
      { href: '/support/supportchatthread/', count: d.chats_new },
    ].forEach(function (t) {
      document.querySelectorAll('#nav-sidebar a').forEach(function (a) {
        if (!a.href || !a.href.includes(t.href)) return;
        var el = a.querySelector('.ws-nav-badge');
        if (t.count) {
          if (!el) { el = document.createElement('span'); el.className = 'ws-nav-badge'; a.appendChild(el); }
          el.textContent = t.count;
        } else if (el) { el.remove(); }
      });
    });
  }

  function loadCounts() {
    fetch('/support/admin-counts/', { credentials: 'same-origin' })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (d) { if (d) applyBadges(d); })
      .catch(function () {});
  }

  function init() { injectPanel(); loadCounts(); }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
  setInterval(loadCounts, 60000);
})();
</script>
{% endblock %}
