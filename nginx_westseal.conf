# /etc/nginx/sites-available/westseal
# Замени PROJECT_DIR на реальный путь к проекту, PORT на порт Daphne

upstream daphne {
    server 127.0.0.1:8001;
}

# Редирект HTTP → HTTPS
server {
    listen 80;
    server_name westseal.ru www.westseal.ru;
    return 301 https://westseal.ru$request_uri;
}

# Редирект www → без www (HTTPS)
server {
    listen 443 ssl;
    server_name www.westseal.ru;

    ssl_certificate     /etc/letsencrypt/live/westseal.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/westseal.ru/privkey.pem;

    return 301 https://westseal.ru$request_uri;
}

# Основной сервер
server {
    listen 443 ssl;
    server_name westseal.ru;

    ssl_certificate     /etc/letsencrypt/live/westseal.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/westseal.ru/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # HSTS — включать ТОЛЬКО когда сайт стабильно работает на HTTPS!
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 50M;

    # Статика (WhiteNoise обрабатывает сама, но можно раздавать через nginx)
    location /static/ {
        alias /home/ivan/euro-seal/staticfiles/;  # ⚠ замени путь
        expires 30d;
    }

    location /media/ {
        alias /home/ivan/euro-seal/media/;  # ⚠ замени путь
        expires 7d;
    }

    # WebSocket (Django Channels)
    location /ws/ {
        proxy_pass http://daphne;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Всё остальное — в Daphne
    location / {
        proxy_pass http://daphne;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
